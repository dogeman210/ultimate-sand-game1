<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Sandbox</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; color: #ddd; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; user-select: none; }
#topBar { width: 100%; background: #111; padding: 6px 10px; display: flex; align-items: center; gap:10px; flex-wrap: wrap; border-bottom: 2px solid #333; }
#topBar span { font-size: 18px; font-weight: bold; color: #e8c87a; letter-spacing: 1px; }
#mainArea  {display: flex; gap: 0; width: 100%; flex: 1;}
#leftPanel { width: 170px; min-width: 170px; background: #181818; border-right: 2px solid #2a2a2a; padding: 8px 6px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; max-height: calc(100vh - 50px); }
#leftPanel h3 { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; border-bottom: 1px solid #333; padding-bottom: 3px; }
.matBtn { width: 100%; padding: 5px 7px; border: 1px solid #333; background: #222; color: #ccc; font-size: 12px; font-family: monospace; cursor: pointer; text-align: left; border-radius: 3px; display: flex; align-items: center; gap: 6px; transition: background 0.1s; }
.matBtn:hover { background: #2e2e2e; }
.matBtn.active { border-color: #e8c87a; background: #2e2e2e; color:#e8c87a;}
.matColor { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.15); }
#canvasWrap  {flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 8px; position: relative;}
canvas {display: block; cursor: crosshair; border: 1px solid #333; image-rendering: pixelated;}
#rightPanel  {width: 200px; min-width: 200px; background: #181818; border-left: 2px solid #2a2a2a; padding: 8px 8px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: calc(100vh - 50px);}
#rightPanel h3 { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; border-bottom: 1px solid #333; padding-bottom: 3px; }
.sliderRow  {display: flex; flex-direction: column; gap: 2px;}
.sliderRow label {font-size: 11px; color: #aaa; display: flex; justify-content: space-between;}
.sliderRow label span {color: #e8c87a;}
.sliderRow input[type=range]{width: 100%;accent-color:#e8c87a;} 
.ctrlBtn { width: 100%; padding: 5px 7px; border: 1px solid #333; background: #222; color: #ccc; font-size: 12px; font-family: monospace; cursor: pointer; border-radius: 3px; transition: background 0.1s; }
.ctrlBtn:hover { background: #2e2e2e; }
.ctrlBtn.danger { border-color: #7a2222; color: #e87a7a; }
.ctrlBtn.danger:hover{background:#2a1010;}
#statsBox{background: #111; border: 1px solid #2a2a2a; border-radius: 3px; padding: 6px 8px;font-size:11px; color:#888;}
#statsBox div {margin-bottom: 2px;} 
#statsBox span { color: #bbb;}
.sepLine{border: none;border-top:1px solid #2a2a2a; margin: 2px 0;} 
</style>
</head>
<body>
<div id="topBar">
<span>Particle Sandbox</span>
<div style="font-size:11px;color:#666;">Click or drag on the canvas to place particles</div>
</div>
<div id="mainArea">
<div id="leftPanel">
<h3>Materials</h3>
<div id="matList"></div>
</div>
<div id="canvasWrap"> 
<canvas id="gc"></canvas>
</div>
<div id="rightPanel">
<h3>Canvas Controls</h3>
<div class="sliderRow">
<label>Brush Size <span id="szVal">4</span></label>
<input type="range" id="szSlider" min="1" max="30" value="4">
</div>
<div class="sliderRow"> 
<label>Gravity <span id="gVal">0.15</span></label> 
<input type="range"id="gSlider"min="0" max="100"value="15"> 
</div>
<div class="sliderRow"> 
<label>Wind X <span id="wxVal">0.00</span></label>
<input type="range"id="wxSlider" min="-50" max="50" value="0">
</div>
<div class="sliderRow"> 
<label>Wind Y <span id="wyVal">0.00</span></label>
<input type="range"id="wySlider" min="-50" max="50" value="0">
</div>
<div class="sliderRow"> 
<label>Spread<span id="spVal">1.0</span></label>
<input type="range" id="spSlider" min="1" max="30"value="10">
</div>
<div class="sliderRow">
<label>Sim Speed <span id="ssVal">1x</span></label>
<input type="range" id="ssSlider" min="1" max="8" value="1">
</div> 
<hr class ="sepLine"> 
<h3>Actions</h3>
<button class="ctrlBtn" id="pauseBtn">Pause</button>
<button class="ctrlBtn" id="stepBtn">Step One Frame</button>
<button class="ctrlBtn danger" id="clearBtn">Clear All</button>
<button class="ctrlBtn" id="fillGravBtn">Flip Gravity</button>
<button class="ctrlBtn" id="invertBtn">Invert Colors</button>
<button class="ctrlBtn" id="saveBtn">Save as PNG</button>
<hr class="sepLine">
<h3>Stats</h3>
<div id="statsBox">
<div>Particles: <span id="stPart">0</span></div>
<div>FPS: <span id="stFPS">0</span></div>
<div>Selected: <span id="stSel">-</span></div>
<div>Grid: <span id="stGrid">-</span></div> 
</div> 
<hr class="sepLine"> 
<h3>Draw Mode</h3>
<button class="ctrlBtn" id="modeCircle" style="border-color:#e8c87a;">Circle Brush</button>
<button class="ctrlBtn" id="modeSquare">Square Brush</button>
<button class="ctrlBtn" id="modeEraser">Eraser</button>
<button class="ctrlBtn" id="modeLine">Line Mode</button>
<hr class="sepLine">
<h3>Presets</h3>
<button class ="ctrlBtn" id="presetVolcano">Volcano</button>
<button class ="ctrlBtn" id="presetOcean">Ocean Floor</button>
<button class ="ctrlBtn" id="presetSandCastle">Sand Dunes</button>
<button class ="ctrlBtn" id="presetOilFire">Oil Fire</button>
</div>
</div> 
<script> 
(function(){
var kW = 300, kH = 220;
var gCanvas = document.getElementById('gc');
gCanvas.width = kW;
gCanvas.height = kH;
gCanvas.style.width = (kW * 2.5) + 'px';
gCanvas.style.height = (kH * 2.5) + 'px';
var gCtx = gCanvas.getContext('2d');
var gImg = gCtx.createImageData(kW,kH); 
var gPix = gImg.data; 

var EMPTY = 0, SAND = 1, WATER = 2, WALL = 3, FIRE = 4, SMOKE = 5, WOOD = 6, OIL = 7, GAS = 8, LAVA = 9, STONE = 10, ACID = 11, STEAM = 12, ASH = 13, GUNPOWDER = 14, ICE = 15, SALT = 16, GLASS = 17, VOID = 18, PLANT = 19, SNOW = 20, CLOUD = 21, METHANE = 22, COAL = 23, OBSIDIAN = 24, MUD = 25;

var matDefs = [
    {id:EMPTY, nm: 'Eraser', col: [0,0,0], cat: 'special'},
    {id:SAND,  nm:'Sand', col: [194,154,74], cat:'powder'}, 
    {id:WATER, nm: 'Water', col: [30,100,200], cat: 'liquid'},
    {id:WALL, nm: 'Wall', col: [90,90,90], cat: 'solid'},
    {id:FIRE, nm: 'Fire', col: [230, 80, 10], cat: 'liquid'},
    {id:SMOKE, nm: 'Smoke', col: [130,130,130], cat: 'gas'}, 
    {id:WOOD, nm: 'Wood', col:[110,70,30], cat: 'solid'},
    {id:OIL, nm: 'Oil', col:[90,60,10], cat: 'liquid'},
    {id:GAS, nm: 'Gas', col:[200,230,200], cat:'gas'},
    {id:LAVA, nm: 'Lava', col: [220,60,0], cat: 'liquid'},
    {id:STONE, nm: 'Stone', col: [120,120,110], cat:'solid'},
    {id:ACID, nm: 'Acid', col: [80,220,40], cat:'liquid'},
    {id:STEAM, nm: 'Steam', col: [190, 210, 230], cat: 'gas'},
    {id:ASH, nm: 'Ash', col: [160,150,145], cat:'powder'},
    {id:GUNPOWDER, nm: 'Gunpowder', col: [50,50,50], cat:'powder'},
    {id:ICE, nm: 'Ice', col: [170,220,255], cat: 'solid'},
    {id:SALT, nm: 'Salt', col: [230,230,230], cat: 'powder'},
    {id:GLASS, nm: 'Glass', col: [180,220,240], cat: 'solid'},
    {id:VOID, nm: 'Void', col: [20,0,40], cat: 'special'},
    {id:PLANT, nm: 'Plant', col: [30,140,30], cat: 'solid'},
    {id:SNOW, nm: 'Snow', col: [240,240,255], cat: 'powder'},
    {id:CLOUD, nm: 'Cloud', col: [210,210,220], cat: 'gas'},
    {id:METHANE, nm: 'Methane', col: [200,200,100], cat: 'gas'},
    {id:COAL, nm: 'Coal', col: [30,30,30], cat: 'solid'},
    {id:OBSIDIAN, nm: 'Obsidian', col: [30,20,40], cat: 'solid'},
    {id:MUD, nm: 'Mud', col: [90,65,30], cat: 'powder'},
];

var gGrid = new Uint8Array(kW*kH);
var gTemp = new Int16Array(kW*kH);
var gLife = new Uint8Array(kW*kH);
var gUpdated = new Uint8Array(kW*kH);

function gldx(x,y){return y*kW+x;}
function gGet(x,y){if(x<0||x>=kW||y<0||y>=kH)return WALL; return gGrid[y*kW+x];}
function gSet(x,y,t){if(x<0||x>=kW||y<0||y>=kH)return; gGrid[y*kW+x]=t;}
function gSwap(x1, y1, x2, y2) {
    var i1=y1*kW+x1,i2=y2*kW+x2;
    var tmp = gGrid[i1]; gGrid[i1] = gGrid[i2]; gGrid[i2] = tmp;
    var tmpT = gTemp[i1]; gTemp[i1] = gTemp[i2]; gTemp[i2] = tmpT;
    var tmpL = gLife[i1]; gLife[i1] = gLife[i2]; gLife[i2] = tmpL;
}

var matColorMap = {};
for(var qi = 0; qi < matDefs.length; qi++){
    matColorMap[matDefs[qi].id]=matDefs[qi].col;
}

var selMat = SAND;
var gGravity = 0.15;
var gWindX = 0;
var gWindY = 0;
var gSpread = 1;
var gBrushSz = 4;
var gPaused = false;
var gSimSpeed = 1;
var gGravDir = 1;
var gColorInvert = false;
var gBrushMode = 'circle'
var gDrawMode = 'draw'
var gMouseDown = false;
var gMX = 0, gMY = 0;
var gLMX = -1, gLMY = -1;
var gLineStart = null;

var matList = document.getElementById('matList');
var catOrder = ['special','powder','liquid','solid','gas','energy'];
var catNames = {special:'Special',powder:'Powders',liquid:'Liquids',solid:'Solids',gas:'Gases',energy:'Energy'};
var grouped ={};
for (var pi = 0; pi < catOrder.length;pi++)grouped[catOrder[pi]]=[]
for (var mi = 0; mi < matDefs.length;mi++){
    var md = matDefs[mi];
    if(!grouped[md.cat]) grouped[md.cat] = [];
    grouped[md.cat].push(md);
}
for (var ci = 0; ci < catOrder.length;ci++){
    var cat = catOrder[ci];
    if (!grouped[cat]||grouped[cat].length === 0)continue;
    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:10px;color:#555;margin:5px 0 2px 0;text-transform:uppercase;letter-spacing:1px;';
    hdr.textContent = catNames[cat];
    matList.appendChild(hdr);
    for (var bi = 0; bi < grouped[cat].length;bi++){
        var mdef=grouped[cat][bi];
        (function(mdef2){
            var btn = document.createElement('button');
            btn.className = 'matBtn'
            btn.dataset.matid = mdef2.id;
            var swatch = document.createElement('div')
            swatch.className = 'matColor';
            swatch.style.background = 'rgb('+mdef2.col[0]+','+mdef2.col[1]+','+mdef2.col[2]+')';
            btn.appendChild(swatch);
            btn.appendChild(document.createTextNode(mdef2.nm));
            btn.addEventListener('click',function(){
                selMat = mdef2.id;
                if (mdef2.id ===EMPTY){gDrawMode = 'erase';}else{gDrawMode = 'draw';}
                document.querySelectorAll('.matBtn').forEach(function(b){b.classList.remove('active');});
                btn.classList.add('active');
                document.getElementById('stSel').textContent = mdef2.nm;
            });
            matList.appendChild(btn);
            if(mdef2.id === SAND) {btn.classList.add('active');document.getElementById('stSel').textContent = mdef2.nm;}
        })(mdef);
    }
}

var szSlider = document.getElementById('szSlider');
var gSlider = document.getElementById('gSlider');
var wxSlider = document.getElementById('wxSlider');
var wySlider = document.getElementById('wySlider');
var spSlider = document.getElementById('spSlider');
var ssSlider = document.getElementById('ssSlider');

szSlider.addEventListener('input', function () {
    gBrushSz = parseInt(this.value, 10);
    document.getElementById('szVal').textContent = this.value;
});
gSlider.addEventListener('input', function () {
    gGravity = parseInt(this.value, 10) / 100;
    document.getElementById('gVal').textContent = gGravity.toFixed(2);
});
wxSlider.addEventListener('input', function () {
    gWindX = parseInt(this.value, 10) / 100;
    document.getElementById('wxVal').textContent = gWindX.toFixed(2);
});
wySlider.addEventListener('input', function () {
    gWindY = parseInt(this.value, 10) / 100;
    document.getElementById('wyVal').textContent = gWindY.toFixed(2);
});
spSlider.addEventListener('input', function () {
    gSpread = parseInt(this.value, 10) / 10;
    document.getElementById('spVal').textContent = gSpread.toFixed(1);
});
ssSlider.addEventListener('input', function () {
    gSimSpeed = parseInt(this.value, 10);
    document.getElementById('ssVal').textContent = this.value + 'x';
});

document.getElementById('pauseBtn').addEventListener('click', function () {
    gPaused = !gPaused;
    this.textContent = gPaused ? 'Resume' : 'Pause';
    this.style.borderColor = gPaused ? '#7a5522' : '#333';
    this.style.color = gPaused ? '#e8a050' : '#ccc';
});

document.getElementById('stepBtn').addEventListener('click', function () {
    if (!gPaused) return;
    runStep();
    drawFrame();
});

document.getElementById('clearBtn').addEventListener('click', function () {
    for (var ii = 0; ii < gGrid.length; ii++) {
        gGrid[ii] = 0;
        gTemp[ii] = 0;
        gLife[ii] = 0;
    }
});

document.getElementById('fillGravBtn').addEventListener('click', function () {
    gGravDir = -gGravDir;
    this.textContent = gGravDir > 0 ? 'Flip Gravity' : 'Gravity Flipped';
});

document.getElementById('invertBtn').addEventListener('click', function () {
    gColorInvert = !gColorInvert;
    this.style.borderColor = gColorInvert ? '#e8c87a' : '#333';
});

document.getElementById('saveBtn').addEventListener('click', function () {
    var a = document.createElement('a');
    a.href = gCanvas.toDataURL('image/png');
    a.download = 'sandbox.png';
    a.click();
});

document.getElementById('modeCircle').addEventListener('click', function () {
    gBrushMode = 'circle';
    document.querySelectorAll('#rightPanel .ctrlBtn').forEach(function (b) {
        if (['modeCircle', 'modeSquare', 'modeEraser', 'modeLine'].indexOf(b.id) >= 0) {
            b.style.borderColor = '#333';
            b.style.color = '#ccc';
        }
    });
    this.style.borderColor = '#e8c87a';
    this.style.color = '#e8c87a';
});

document.getElementById('modeEraser').addEventListener('click', function () {
    gBrushMode = 'eraser';
    document.querySelectorAll('#rightPanel .ctrlBtn').forEach(function (b) {
        if (['modeCircle', 'modeSquare', 'modeEraser', 'modeLine'].indexOf(b.id) >= 0) {
            b.style.borderColor = '#333';
            b.style.color = '#ccc';
        }
    });
    this.style.borderColor = '#e8c87a';
    this.style.color = '#e8c87a';
});

document.getElementById('modeLine').addEventListener('click', function () {
    gBrushMode = 'line';
    gLineStart = null;
    document.querySelectorAll('#rightPanel .ctrlBtn').forEach(function (b) {
        if (['modeCircle', 'modeSquare', 'modeEraser', 'modeLine'].indexOf(b.id) >= 0) {
            b.style.borderColor = '#333';
            b.style.color = '#ccc';
        }
    });
    this.style.borderColor = '#e8c87a';
    this.style.color = '#e8c87a';
});

document.getElementById('presetVolcano').addEventListener('click', function () {
    for (var ii = 0; ii < gGrid.length; ii++) {
        gGrid[ii] = 0;
        gTemp[ii] = 0;
        gLife[ii] = 0;
    }
    var cx = Math.floor(kW / 2);
    for (var qy = kH - 1; qy >= kH - 40; qy--) {
        if (cx >= 0 && cx < kW) gSet(cx, qy, STONE);
    }

    for (var ly = kH - 40; ly >= kH - 60; ly--) {
        var lw = Math.floor((kH - 40 - ly) * 0.6 + 4);
        for (var lx = cx - lw; lx <= cx + lw; lx++) {
            if (lx >= 0 && lx < kW) gSet(lx, ly, STONE);
        }
    }
    for (var vy = kH - 60; vy >= kH - 70; vy--) {
        for (var vx = cx - 3; vx <= cx + 3; vx++) {
            if (vx >= 0 && vx < kW) gSet(vx, vy, LAVA);
        }
    }
});

document.getElementById('presetOcean').addEventListener('click', function () {
    for (var ii = 0; ii < gGrid.length; ii++) {
        gGrid[ii] = 0;
        gTemp[ii] = 0;
        gLife[ii] = 0;
    }
    var baseY = Math.floor(kH * 0.7);
    for (var qx = 0; qx < kW; qx++) {
        var hh = baseY + Math.floor(Math.sin(qx * 0.1) * 8 + Math.sin(qx * 0.05) * 12);
        for (var qy = hh; qy < kH; qy++) gSet(qx, qy, SAND);
        for (var wy = 0; wy < hh; wy++) gSet(qx, wy, WATER);
    }
});

document.getElementById('presetSandCastle').addEventListener('click', function () {
    for (var ii = 0; ii < gGrid.length; ii++) {
        gGrid[ii] = 0;
        gTemp[ii] = 0;
        gLife[ii] = 0;
    }
    for (var qx = 0; qx < kW; qx++) {
        var dh = kH - 20 - Math.floor(Math.abs(Math.sin(qx * 0.04)) * 30 + Math.sin(qx * 0.1) * 8);
        for (var qy = dh; qy < kH; qy++) gSet(qx, qy, SAND);
    }
});

document.getElementById('presetOilFire').addEventListener('click', function () {
    for (var ii = 0; ii < gGrid.length; ii++) {
        gGrid[ii] = 0;
        gTemp[ii] = 0;
        gLife[ii] = 0;
    }
    for (var qx = 40; qx < kW - 40; qx++) {
        for (var qy = Math.floor(kH * 0.6); qy < Math.floor(kH * 0.9); qy++) gSet(qx, qy, OIL);
    }
    for (var qx2 = 40; qx2 < kW - 40; qx2++) gSet(qx2, Math.floor(kH * 0.9), WALL);
    for (var fx = 60; fx < 80; fx++) gSet(fx, Math.floor(kH * 0.6) - 1, FIRE);
});

function canvasXY(e){
    var rect = gCanvas.getBoundingClientRect();
    var scx = kW/rect.width, scy = kH/rect.height;
    var cx = (e.clientX - rect.left)*scx;
    var cy = (e.clientY - rect.top)*scy;
    return[Math.floor(cx),Math.floor(cy)];
}
gCanvas.addEventListener('mousedown',function(e){
    e.preventDefault();
    gMouseDown = true;
    var pos = canvasXY(e);
    gMX = pos[0];gMY = pos[1];
    if(gBrushMode === 'line'){
        if(gLineStart === null){gLineStart = [gMX, gMY];}
        else{
            drawLine(gLineStart[0],gLineStart[1],gMX,gMY);
            gLineStart = null;
        }
    }else{paintBrush(gMX,gMY);}
    gLMX = gMX; gLMY = gMY;
});
gCanvas.addEventListener('mousemove',function(e){
    e.preventDefault();
    var pos = canvasXY(e);
    gMX = pos[0];gMY = pos[1];
    if(!gMouseDown)return;
    if(gBrushMode === 'line')return;
    if(gLMX<0){paintBrush(gMX,gMY);}
    else {paintBrushLine(gLMX,gLMY,gMX,gMY);}
    gLMX = gMX;gLMY = gMY;
});
gCanvas.addEventListener('mouseup',function(e){gMouseDown = false;gLMX = -1;gLMY = -1;});
gCanvas.addEventListener('mouseleave',function(e){gMouseDown = false;gLMX = -1;gLMY = -1;});
gCanvas.addEventListener('touchstart',function(e){
    e.preventDefault();
    gMouseDown = true;
    var pos = canvasXY(e.touches[0]);
    gMX = pos[0];gMY = pos[1];
    paintBrush(gMX,gMY);
    gLMX = gMX; gLMY = gMY;
},{passive:false});
gCanvas.addEventListener('touchmove',function(e){
    e.preventDefault();
    var pos = canvasXY(e.touches[0]);
    gMX = pos[0]; gMY = pos[1];
    paintBrushLine(gLMX,gLMY,gMX,gMY);
    gLMX = gMX; gLMY = gMY;
}, { passive: false});
gCanvas.addEventListener('touchend',function(){gMouseDown = false;gLMX = -1;gLMY = -1;});

function putParticle(x,y,t){
    if(x<0||x>=kW||y<0||y>=kH)return;
    if(gBrushMode === 'eraser'||gDrawMode ==='erase'){gSet(x,y,EMPTY);return;}
    if(t===VOID){gSet(x,y,VOID);return}
    if(gGrid[y*kW+x]===WALL||gGrid[y*kW+x]===STONE)return;
    if(t===FIRE){gLife[y*kW+x]=80+Math.floor(Math.random()*60);}
    else if (t===SMOKE){gLife[y*kW+x]=100 + Math.floor(Math.random()*80);}
    else if (t===GAS||t===METHANE){gLife[y*kW+x]=150+Math.floor(Math.random()*100);}
    else if (t===STEAM){gLife[y*kW+x]= 120 + Math.floor(Math.random()*80);}
    else if (t===CLOUD){gLife[y*kW+x]= 200 + Math.floor(Math.random()*100);}
    else{gLife[y*kW+x]=0;}
    gSet(x,y,t);
}
function paintBrush(cx,cy){
    var t = (gBrushMode === 'eraser')? EMPTY : selMat;
    var r = gBrushSz;
    if(gBrushMode === 'square'){
        for(var dy = -r;dy<=r;dy++)for(var dx = -r;dx <=r;dx++)putParticle(cx + dx, cy + dy,t);
    } else {
        for (var dy = -r; dy<=r;dy++)for(var dx= -r; dx <=r;dx++){
            if (dx*dx + dy*dy <=r*r)putParticle(cx+dx,cy+dy,t);
        }
    }
}
function paintBrushLine(x0,y0,x1,y1){
    var dx = Math.abs(x1 - x0),dy = Math.abs(y1 - y0);
    var sx = x0 < x1 ? 1 : -1,sy = y0 < y1 ? 1 : -1;
    var err = dx - dy, cx = x0, cy = y0;
    while (true) {
        paintBrush(cx,cy);
        if(cx===x1&&cy===y1)break;
        var e2 = 2 * err;
        if(e2>-dy){ err-=dy;cx+=sx;}
        if(e2<dx){err+=dx;cy+=sy;}
    }
}

if(xtcell === RUBBER){
    var xrbAdj = [[xtx-1,xty],[xtx+1,xty],[xtx,xty-1],[xtx,xty+1]];
    for (var xrbi = 0; xrbi < xrbAdj.length; xrbi++){
        var xrbx = xrbAdj[xrbi][0], xrby2 = xrbAdj[xrbi][1];
        if (xrbx < 0 || xrbx >= kW || xrby2 < 0 || xrby2 >= kH) continue;
        var xrbnb = gGrid[xrby2 * kW + xrbx];
        if(xrbnb === FIRE && qRand() < 0.004){
            gGrid[xtidx] = FIRE;
            gLife[xtidx] = 80 + qRandInt(80);
            gUpdated[xtidx] = 1;
        } else if (xrbnb === ACID && qRand() < 0.03){
            gGrid[xtidx] = EMPTY;
            gUpdated[xtidx] = 1;
        } else if (isPowder(xrbnb) && qRand() < 0.1){
            var xrbpox = 2 * xtx - xrbx, xrbpoy = 2 * xty - xrby2;
            if(xrbpox >= 0 && xrbpox < kW && xrbpoy >= 0 && xrbpoy < kH && gGrid[xrbpoy*kW + xrbpox]===EMPTY){
                gGrid[xrbpoy*kW + xrbpox] = xrbnb;
                gLife[xrbpoy*kW + xrbpox] = gLife[xrby2*kW + xrbx];
                gGrid[xrby2*kW + xrbx] = EMPTY;
                gUpdated[xrbpoy*kW + xrbpox] = 1;
                gUpdated[xrby2*kW + xrbx] = 1;
            }
        }
    }
    continue;
}


var xOldRunStepRef = runStep;
runStep = function() {
    xOldRunStepRef();
    xRunNewMaterials();

};

var xOldDrawFrame = drawFrame;
drawFrame = function() {
    xOldDrawFrame();
    for (var xfy = 0; xfy < kH; xfy++){
        for (var xfx = 0; xfx < kW; xfx++){
            var xfidx = xfy*kW + xfx;
            var xfcell = gGrid[xfidx];
            if(xfcell < xNEWMAT_START)continue;
            var xfc = matColorMap[xfcell];
            if(!xfc)continue;
            var xr = xfc[0], xg = xfc[1], xb = xfc[2];
            var xvr = gColorVar[xfidx*3], xvg = gColorVar[xfidx*3 + 1], xvb = gColorVar[xfidx*3 + 2];
            if (xfcell === HONEY){
                var xhpulse = 0.7 + 0.3 * Math.sin(Date.now()*0.002 + xfx * 0.3 + xfy * 0.2);
                xr = clamp255(Math.floor(210*xhpulse + xvr * 0.3));
                xg = clamp255(Math.floor(140*xhpulse + xvg * 0.3));
                xb = clamp255(Math.floor(20 + xvb*0.1));
            } else if (xfcell === SLIME){
                var xspulse = 0.6 + 0.4 * Math.sin(Date.now()*0.004 + xfx * 0.5);
                xr = clamp255(Math.floor(30 + xvr));
                xg = clamp255(Math.floor(180 * xspulse + xvg));
                xb = clamp255(Math.floor(60 + xvb));
            } else if (xfcell === VIRUS) {
                var xvpulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.008 + xfx * 0.8 + xfy * 0.4);
                xr = clamp255(Math.floor(20 + xvr));
                xg = clamp255(Math.floor(160 + 80 * xvpulse + xvg));
                xb = clamp255(Math.floor(220 + 35 * xvpulse + xvb));
            } else if (xfcell === CRYSTAL) {
                var xcpulse = 0.6 + 0.4 * Math.sin(Date.now()*0.005 + xfx * 0.4 + xfy * 0.6);
                xr = clamp255(Math.floor(80 + 60 * xcpulse + xvr));
                xg = clamp255(Math.floor(180 + 60 * xcpulse + xvg));
                xb = clamp255(Math.floor(220 + 35 * xcpulse + xvb));
            } else if (xfcell === EMBER) {
                var xepulse = gLife[xfidx]/120;
                xr = clamp255(Math.floor(255));
                xg = clamp255(Math.floor(80 + xepulse * 100 + xvg * 0.3));
                xb = clamp255(Math.floor(10 + xvb * 0.1));
            } else if (xfcell === SPORE) {
            var xsopulse = gLife[xfidx]/180;
            xr = clamp255(Math.floor(xfc[0]*xsopulse + xvr));
            xg = clamp255(Math.floor(xfc[1]*xsopulse + xvg));
            xb = clamp255(Math.floor(xfc[2]*xsopulse + xvb));

            } else if (xfcell === CEMENT && xCementSet[xfidx]) {
                xr = clamp255(140 + xvr);
                xg = clamp255(135 + xvg);
                xb = clamp255(130 + xvb);
            } else if (xfcell === MAGNET) {
                var xmpulse = 0.7 + 0.3 * Math.sin(Date.now()*0.006 + xfx * 0.3);
                xr = clamp255(Math.floor(140 + 60 * xmpulse + xvr));
                xg = clamp255(Math.floor(20+xvg));
                xb = clamp255(Math.floor(160 + 60 * xmpulse + xvb));
            } else if (xfcell === FUNGUS) {
                xr = clamp255(xfc[0] + xvr);
                xg = clamp255(xfc[1] + xvg);
                xb = clamp255(xfc[2] + xvb);
            }else {
                xr = clamp255(xfc[0]+xvr);
                xg = clamp255(xfc[1]+xvg);
                xb = clamp255(xfc[2] + xvb);
            }
            if(gColorInvert){ xr = 255 - xr; xg = 255 - xg; xb = 255 - xb;}
            var xfp = (xfy * kW + xfx) * 4;
            gPix[xfp]   =xr;
            gPix[xfp + 1] = xg;
            gPix[xfp + 2] = xb;
            gPix[xfp + 3] = 255;
        }
    }
    gCtx.putImageData(glmg,0,0);
};

var xOldPutParticle = putParticle;
putParticle = function(x,y,t) {
    if (x < 0 ||x >=kW || y<0||y>=kH)return;
    if(gBrushMode === 'eraser'||gDrawMode === 'eraser'){gSet(x,y,EMPTY);return;}
    if(t<xNEWMAT_START){xOldPutParticle(x,y,t);return;}
    if(gGrid[y*kW + x]=== WALL)return;
    if(t===EMBER){gLife[y*kW + x] = 80 + Math.floor(Math.random()*60);}
    else if(t===SPORE){gLife[y*kW + x] = 100 + Math.floor(Math.random()*80);}
    else {gLife[y*kW + x] = 0; xCementSet[y*kW + x] = 0;}
    gSet(x,y,t);
};
